<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Informasi — KO AWIS</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- Navbar injected at runtime (no login/register buttons) -->
  <!-- include via /js/include-navbar.js -->

  <main style="max-width:1200px;margin:0 auto;padding:2rem 0;">
    <div class="info-hero">
      <div class="info-hero-bg"></div>
      <div class="info-hero-overlay"></div>
      <div class="info-hero-content">
        <div class="info-hero-tag">UTAMA</div>
        <h1>Informasi Terbaru</h1>
        <p>Berita terkini seputar pertanian kakao, program desa berkelanjutan, dan pembaruan kegiatan komunitas KO AWIS.</p>
        <button class="btn-info-hero" onclick="alert('Membuka artikel utama...')">Baca Selengkapnya →</button>
      </div>
    </div>

    <div class="category-tabs" style="margin-top:1rem;">
      <button class="tab-btn active" onclick="filterArticles('semua', this)">Semua Berita</button>
      <button class="tab-btn" onclick="filterArticles('pertanian', this)">🌱 Pertanian</button>
      <button class="tab-btn" onclick="filterArticles('program', this)">🏘️ Program Desa</button>
      <button class="tab-btn" onclick="filterArticles('komunitas', this)">👥 Komunitas</button>
      <button class="tab-btn" onclick="filterArticles('pasar', this)">📈 Pasar Kakao</button>
    </div>

    <div style="padding: 0 2rem 1rem;">
      <h2 class="section-article-title">Berita & Artikel Terkini</h2>
    </div>

    <div class="articles-grid" id="articlesGrid" style="padding:0 2rem 2rem;">
      <!-- Populated by JS -->
    </div>

    <div class="pagination" style="padding-bottom:2rem;">
      <div class="page-arrow">‹</div>
      <div class="page-num active">1</div>
      <div class="page-num" onclick="alert('Halaman 2 akan tersedia segera!')">2</div>
      <div class="page-num" onclick="alert('Halaman 3 akan tersedia segera!')">3</div>
      <div class="page-num">…</div>
      <div class="page-num" onclick="alert('Masih dalam pengembangan!')">12</div>
      <div class="page-arrow">›</div>
    </div>
  </main>

  <script src="../js/include-navbar.js"></script>
  <script src="../js/include-footer.js"></script>
  <script src="../js/site-data.js"></script>
  <script>
    function renderArticles(filter) {
      const grid = document.getElementById('articlesGrid');
      const ARTICLES = window.SITE_DATA && window.SITE_DATA.ARTICLES ? window.SITE_DATA.ARTICLES : [];
      const filtered = (filter === 'semua') ? ARTICLES : ARTICLES.filter(a => a.cat === filter);
      if (filtered.length === 0) {
        grid.innerHTML = `<div class="no-articles" style="grid-column:1/-1;text-align:center;padding:3rem;"><div style="font-size:3rem;margin-bottom:1rem;">📭</div><p class="text-muted">Belum ada artikel untuk kategori ini.</p></div>`;
        return;
      }
      grid.innerHTML = filtered.map(a => `
        <div class="article-card" onclick="alert('Membuka artikel: ${a.title.substring(0,30)}...')">
          <div class="article-img"><img src="${a.img}" alt="${a.title}" loading="lazy"><span class="article-cat-badge">${a.catLabel}</span></div>
          <div class="article-body">
            <div class="article-meta"><span>📅 ${a.date}</span><span>⏱️ ${a.readTime}</span></div>
            <div class="article-title">${a.title}</div>
            <p class="article-excerpt">${a.excerpt}</p>
            <div class="article-footer"><div class="article-author"><div class="author-avatar">${a.author.charAt(0)}</div><span>${a.author}</span></div><span class="article-link">Selengkapnya ›</span></div>
          </div>
        </div>
      `).join('');
    }
    function filterArticles(cat, btn) { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); if (btn) btn.classList.add('active'); renderArticles(cat); }
    document.addEventListener('DOMContentLoaded', () => { renderArticles('semua'); });
  </script>
</body>
</html>
