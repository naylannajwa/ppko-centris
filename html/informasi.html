<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Galeri Kegiatan — KO AWIS</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/png" href="../assets/logo-koawis-brand.png" style="height: 165px; width: auto;">

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- Navbar injected at runtime (no login/register buttons) -->
  <!-- include via /js/include-navbar.js -->

  <main style="max-width:1200px;margin:0 auto;padding:2rem 0;">
    <div class="info-hero">
      <div class="info-hero-bg"></div>
      <div class="info-hero-overlay"></div>
      <div class="info-hero-content">
        <div class="info-hero-tag">UTAMA</div>
        <h1>Kegiatan Terbaru</h1>
        <p>Berita terkini seputar pertanian kakao, program desa berkelanjutan, dan pembaruan kegiatan komunitas KO AWIS.</p>
        <button class="btn-info-hero" onclick="alert('Membuka artikel utama...')">Baca Selengkapnya →</button>
      </div>
    </div>

    <div class="category-tabs" style="margin-top:1rem;">
      <button class="tab-btn active" onclick="filterArticles('semua', this)">Semua Berita</button>
      <button class="tab-btn" onclick="filterArticles('pertanian', this)"><i class="fas fa-seedling"></i> Pertanian</button>
      <button class="tab-btn" onclick="filterArticles('program', this)"><i class="fas fa-home"></i> Program Desa</button>
      <button class="tab-btn" onclick="filterArticles('komunitas', this)"><i class="fas fa-users"></i> Komunitas</button>
      <button class="tab-btn" onclick="filterArticles('pasar', this)"><i class="fas fa-chart-line"></i> Pasar Kakao</button>
    </div>

    <div style="padding: 0 2rem 1rem;">
      <h2 class="section-article-title">Berita & Artikel Terkini</h2>
    </div>

    <div class="articles-grid" id="articlesGrid" style="padding:0 2rem 2rem;">
      <!-- Populated by JS -->
    </div>

    <div class="pagination" style="padding-bottom:2rem;">
      <div class="page-arrow"><i class="fas fa-chevron-left"></i></div>
      <div class="page-num active">1</div>
      <div class="page-num" onclick="alert('Halaman 2 akan tersedia segera!')">2</div>
      <div class="page-num" onclick="alert('Halaman 3 akan tersedia segera!')">3</div>
      <div class="page-num">…</div>
      <div class="page-num" onclick="alert('Masih dalam pengembangan!')">12</div>
      <div class="page-arrow"><i class="fas fa-chevron-right"></i></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/include-navbar.js"></script>
  <script src="../js/include-footer.js"></script>
  <script src="../js/site-data.js"></script>
  <script>
    async function renderArticles(filter) {
      const grid = document.getElementById('articlesGrid');
      grid.innerHTML = '<p style="text-align:center; grid-column:1/-1;">Memuat artikel...</p>';
      
      try {
        let query = supabase.from('articles').select('*').eq('is_published', true);
        if (filter !== 'semua') {
          query = query.eq('category', filter);
        }
        
        const { data: articles, error } = await query;
        
        if (error) throw error;
        
        if (!articles || articles.length === 0) {
        grid.innerHTML = `<div class="no-articles" style="grid-column:1/-1;text-align:center;padding:3rem;"><div style="font-size:3rem;margin-bottom:1rem;color:#ccc;"><i class="fas fa-newspaper"></i></div><p class="text-muted">Belum ada artikel untuk kategori ini.</p></div>`;
        return;
      }
      
      grid.innerHTML = articles.map(a => `
        <div class="article-card" onclick="alert('Membuka artikel: ${a.title.substring(0,30)}...')">
          <div class="article-img"><img src="${a.image_url || 'https://via.placeholder.com/400x200'}" alt="${a.title}" loading="lazy"><span class="article-cat-badge">${a.category}</span></div>
          <div class="article-body">
            <div class="article-meta"><span><i class="far fa-calendar-alt"></i> ${new Date(a.created_at).toLocaleDateString('id-ID')}</span><span><i class="far fa-clock"></i> ${a.read_time || 5} min baca</span></div>
            <div class="article-title">${a.title}</div>
            <p class="article-excerpt">${a.excerpt}</p>
            <div class="article-footer"><div class="article-author"><div class="author-avatar">${(a.author || 'A').charAt(0)}</div><span>${a.author || 'Admin'}</span></div><span class="article-link">Selengkapnya <i class="fas fa-chevron-right" style="font-size:0.8em;"></i></span></div>
          </div>
        </div>
      `).join('');
      } catch (e) {
        console.error(e);
        grid.innerHTML = '<p style="text-align:center; grid-column:1/-1;">Gagal memuat artikel.</p>';
      }
    }
    function filterArticles(cat, btn) { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); if (btn) btn.classList.add('active'); renderArticles(cat); }
    document.addEventListener('DOMContentLoaded', () => { renderArticles('semua'); });
  </script>
</body>
</html>
