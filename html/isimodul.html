<!doctype html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Modul — KO AWIS</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../assets/logo-koawis-brand.png" style="height: 165px; width: auto;">

    <!-- Tambahkan Library Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <!-- Navbar injected at runtime (no login/register) -->

    <main class="page-isimodul" style="max-width:1200px;margin:2rem auto;padding:0 1rem;">
        <div class="breadcrumb">
            <a href="index.html">🏠 Beranda</a>
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M9 18l6-6-6-6" />
            </svg>
            <a href="modul.html">Modul KO AWIS</a>
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M9 18l6-6-6-6" />
            </svg>
            <a href="modullist.html">Daftar Modul</a>
        </div>

        <div class="isi-modul-layout" style="margin-top:1rem;display:flex;gap:2rem;align-items:flex-start;">
            <!-- Sidebar -->
            <aside class="sidebar-modul" id="sidebarModul" style="width:260px;">
                <div class="sidebar-title">DAFTAR MODUL</div>
                <div class="sidebar-subtitle" id="sidebar-track-name">KO AWIS</div>
                <div class="fs-08 mb-075 text-muted">Progres: <span id="sidebar-progress-text">0% Selesai</span></div>
                <div class="sidebar-progress-bar">
                    <div class="sidebar-progress-fill" id="sidebarProgressFill" style="width:0%"></div>
                </div>
                <nav class="sidebar-nav" id="sidebarNav"></nav>
            </aside>

            <!-- Main Content -->
            <div style="flex:1;display:flex;flex-direction:column;">
                <div class="modul-content" id="modulContent">
                    <!-- Populated by app.js -->
                </div>

                <div class="modul-navigation" style="display:flex;gap:1rem;margin-top:1.5rem;justify-content:flex-end;">
                    <button class="btn-prev" id="btnPrev" onclick="navigateModul(-1)" style="display:none;">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                            viewBox="0 0 24 24">
                            <path d="M15 18l-6-6 6-6" />
                        </svg>
                        Kembali
                    </button>
                    <button class="btn-next" id="btnNext" onclick="navigateModul(1)">
                        Selesaikan & Lanjutkan
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                            viewBox="0 0 24 24">
                            <path d="M9 18l6-6-6-6" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="progress-bar-bottom" style="margin-top:1.5rem;">
            <div class="progress-bar-fill-bottom" id="progressBarBottom" style="width:0%"></div>
        </div>
    </main>

    <script src="../js/include-navbar.js"></script>
    <script src="../js/include-footer.js"></script>
    <script src="../js/supabase-client.js"></script> <!-- Load Client Config -->
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(location.search);
            const modulId = params.get('id'); // Ambil ID modul dari URL

            if (modulId) {
                try {
                    // GANTI: Fetch PHP lama dihapus, ganti dengan Supabase Query
                    // const response = await fetch(`../api/modules/get.php?id=${modulId}`);
                    
                    // Query ke Supabase: Select modules dan join ke tracks
                    const { data: modul, error } = await supabase
                        .from('modules')
                        .select(`
                            *,
                            tracks ( title, slug )
                        `)
                        .eq('id', modulId)
                        .single();

                    if (error) throw error;

                    if (modul) {
                        
                        // Update Judul di Sidebar
                        document.getElementById('sidebar-track-name').textContent = modul.tracks.title;
                        
                        // Tampilkan isi Konten HTML yang dibuat dari Admin ke div modulContent
                        const contentDiv = document.getElementById('modulContent');
                        contentDiv.innerHTML = `
                            <div class="modul-breadcrumb">
                                <a href="modul.html">Modul KO AWIS</a>
                                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
                                <a href="modullist.html?track=${modul.tracks.slug}">${modul.tracks.title}</a>
                            </div>
                            
                            <h1>${modul.title}</h1>
                            <p class="modul-desc">${modul.description}</p>
                            
                            <div style="margin-top: 2rem;">
                                ${modul.content}
                            </div>
                        `;
                        
                        // Sembunyikan navigasi default app.js sementara waktu
                        document.getElementById('btnPrev').style.display = 'none';
                        document.getElementById('btnNext').style.display = 'none';
                    }
                } catch (e) {
                    console.error(e);
                    document.getElementById('modulContent').innerHTML = "<p>Gagal memuat materi. Pastikan koneksi internet lancar.</p>";
                }
            } else {
                document.getElementById('modulContent').innerHTML = "<p>Modul tidak ditemukan.</p>";
            }
        });
    </script>
</body>

</html>
