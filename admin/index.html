<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Dashboard — KO AWIS</title>
  <link rel="stylesheet" href="../css/styleadmin.css">
  <link rel="icon" type="image/png" href="../assets/logo-koawis-brand.png">  
  <script src="https://cdn.ckeditor.com/ckeditor5/39.0.1/classic/ckeditor.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <style>
    /* Sedikit perbaikan tampilan agar editornya tinggi dan rapi */
    .ck-editor__editable { min-height: 250px; font-family: 'Poppins', sans-serif; }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="admin-header">
      <img src="../assets/logo-koawis-rectangle.png" alt="Logo KO AWIS" style="height: 120px; margin-bottom: 0px;">
      <h1 style="margin-top: 0; color: #3D2314; font-size: 1.5rem;">Admin Dashboard</h1>
      <p>Halo, <strong>Admin</strong>! Kelola modul pembelajaran dan konten.</p>
      
      <div class="admin-nav">
        <button onclick="showSection('modules', this)" class="active">Manajemen Modul</button>
        <button onclick="showSection('articles', this)">Artikel</button>
        <button onclick="handleLogout()" class="btn-logout">Logout</button>
      </div>

    </div>

    <!-- MODULES SECTION -->
    <div class="admin-section active" id="section-modules">
      <div class="card">
        <h2 style="margin-top:0; color:#3D2314;">Tambah Modul Baru</h2>
        <div id="alertBox"></div>
        <form id="moduleForm" onsubmit="saveModule(event)">
          <input type="hidden" id="moduleIdInput" value="">
          <input type="hidden" id="moduleImageOld"> <!-- Simpan URL lama -->
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Pilar Pembelajaran</label>
              <select class="form-select" id="trackSelect" required>
                <option value="">-- Pilih Track --</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Judul Modul</label>
              <input class="form-input" id="titleInput" placeholder="Judul modul" required>
            </div>
            <div class="form-group">
              <label class="form-label">Icon</label>
              <input class="form-input" id="iconInput" placeholder="📚" value="📚">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Sub-judul</label>
            <input class="form-input" id="subtitleInput" placeholder="Sub-judul modul (opsional)">
          </div>
          <div class="form-group">
            <label class="form-label">Gambar Sampul Modul</label>
            <input type="file" class="form-input" id="moduleImageInput" accept="image/*">
            <div id="moduleImagePreview" style="margin-top:10px; display:none;">
              <img src="" style="height: 150px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd;">
              <p style="font-size:0.8rem; color:#666;">Preview Gambar</p>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Deskripsi Singkat</label>
            <textarea class="form-textarea" id="descriptionInput" placeholder="Deskripsi singkat modul" required></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Konten Lengkap Modul</label>
            <textarea class="form-textarea" id="contentInput" placeholder="Konten modul" required style="min-height:200px;"></textarea>
          </div>
          <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn-submit" id="btnSubmitForm">➕ Tambah Modul</button>
            <button type="button" class="btn-submit" id="btnCancelEdit" style="display: none; background: #666;" onclick="cancelEdit()">❌ Batal Edit</button>
          </div>
        </form>
      </div>

      <div class="card">
        <h2 style="margin-top:0; color:#3D2314;">Daftar Modul</h2>
        <table class="module-table" id="moduleTable">
          <thead>
            <tr><th>Cover</th><th>Judul</th><th>Jalur</th><th>Status</th><th>Aksi</th></tr>
          </thead>
          <tbody id="moduleBody">
            <tr><td colspan="5" style="text-align:center; color:#999;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ARTICLES SECTION -->
    <div class="admin-section" id="section-articles">
      <div class="card">
        <h2 style="margin-top:0; color:#3D2314;">Manajemen Berita & Artikel</h2>
        <div id="alertBoxArticle"></div>
        
        <form id="articleForm" onsubmit="saveArticle(event)">
          <input type="hidden" id="articleIdInput">
          <input type="hidden" id="articleImageOld"> <!-- Simpan URL lama -->
          
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Judul Artikel</label>
              <input class="form-input" id="artTitleInput" placeholder="Judul berita..." required>
            </div>
            <div class="form-group">
              <label class="form-label">Kategori</label>
              <select class="form-select" id="artCategoryInput" required>
                <option value="pertanian">Pertanian</option>
                <option value="program">Program Desa</option>
                <option value="komunitas">Komunitas</option>
                <option value="pasar">Pasar Kakao</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Gambar Utama (Thumbnail)</label>
            <input type="file" class="form-input" id="artImageInput" accept="image/*">
            <div id="imagePreview" style="margin-top:10px; display:none;">
              <img src="" style="height: 150px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd;">
              <p style="font-size:0.8rem; color:#666;">Preview Gambar</p>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Konten Artikel</label>
            <textarea class="form-textarea" id="artContentInput" placeholder="Tulis artikel di sini..."></textarea>
          </div>

          <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn-submit" id="btnSubmitArticle">➕ Terbitkan Artikel</button>
            <button type="button" class="btn-submit" id="btnCancelArt" style="display: none; background: #666;" onclick="cancelEditArticle()">❌ Batal</button>
          </div>
        </form>
      </div>

      <div class="card">
        <h2 style="margin-top:0; color:#3D2314;">Daftar Artikel</h2>
        <table class="module-table">
          <thead><tr><th>Gambar</th><th>Judul</th><th>Kategori</th><th>Tanggal</th><th>Aksi</th></tr></thead>
          <tbody id="articleBody"><tr><td colspan="5">Memuat...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
  <script>
    let contentEditor;
    let articleEditor; // Editor khusus artikel

    document.addEventListener('DOMContentLoaded', async () => {
      // 0. Cek Login Supabase (Bukan PHP lagi)
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        window.location.href = 'login.html'; // Redirect ke login.html (Supabase)
        return;
      }

      // 1. Init Editor Modul
      ClassicEditor
        .create(document.querySelector('#contentInput'), {
            extraPlugins: [ MyCustomUploadAdapterPlugin ]
        })
        .then(editor => { contentEditor = editor; })
        .catch(error => console.error(error));
      
      // 2. Init Editor Artikel dengan Custom Upload Adapter (Supabase)
      ClassicEditor
        .create(document.querySelector('#artContentInput'), {
            extraPlugins: [ MyCustomUploadAdapterPlugin ]
        })
        .then(editor => { articleEditor = editor; })
        .catch(error => console.error(error));

      loadTracks();
      loadModules();
      loadArticles();

      // 3. Preview Gambar Thumbnail saat dipilih
      document.getElementById('artImageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function(e) {
            const preview = document.getElementById('imagePreview');
            preview.style.display = 'block';
            preview.querySelector('img').src = e.target.result;
          }
          reader.readAsDataURL(file);
        }
      });

      // 4. Preview Gambar Modul saat dipilih
      document.getElementById('moduleImageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function(e) {
            const preview = document.getElementById('moduleImagePreview');
            preview.style.display = 'block';
            preview.querySelector('img').src = e.target.result;
          }
          reader.readAsDataURL(file);
        }
      });
    });

    async function handleLogout() { 
      await supabase.auth.signOut(); 
      window.location.href = 'login.html'; 
    }
    
    function showSection(section, btn) {
      document.querySelectorAll('.admin-section').forEach(el => el.classList.remove('active'));
      document.getElementById('section-' + section).classList.add('active');
      document.querySelectorAll('.admin-nav button').forEach(el => el.classList.remove('active'));
      if (btn) btn.classList.add('active');
    }

    async function loadTracks() {
      // Ganti fetch PHP dengan Supabase
      const { data, error } = await supabase.from('tracks').select('*');
      if (data) {
        const select = document.getElementById('trackSelect');
        // Reset opsi kecuali yang pertama
        select.innerHTML = '<option value="">-- Pilih Track --</option>';
        data.forEach(track => {
          const opt = document.createElement('option');
          opt.value = track.id;
          opt.textContent = track.title;
          select.appendChild(opt);
        });
      }
    }

    async function loadModules() {
      const tbody = document.getElementById('moduleBody');
      // Join tabel tracks untuk ambil nama track
      const { data, error } = await supabase
        .from('modules')
        .select('*, tracks(title)')
        .order('created_at', { ascending: false });

      if (error) {
        tbody.innerHTML = `<tr><td colspan="5" style="color:red;">Error: ${error.message}</td></tr>`;
        return;
      }
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#999;">Belum ada modul.</td></tr>';
        return;
      }

      tbody.innerHTML = data.map(m => `
        <tr>
          <td><img src="${m.image_url || '../assets/logo-koawis-brand.png'}" style="width:50px; height:50px; object-fit:cover; border-radius:4px;"></td>
          <td>${m.title}</td>
          <td>${m.tracks?.title || '-'}</td>
          <td>${m.is_published ? 'Terbit' : 'Draft'}</td>
          <td>
            <button class="btn-action btn-edit" onclick="editModule(${m.id})">Edit</button>
            <button class="btn-action btn-delete" onclick="deleteModule(${m.id}, '${m.title.replace(/'/g,"\\'")}')">Hapus</button>
          </td>
        </tr>
      `).join('');
    }

    function cancelEdit() {
      document.getElementById('moduleForm').reset();
      document.getElementById('moduleIdInput').value = '';
      document.getElementById('moduleImageOld').value = '';
      document.getElementById('moduleImagePreview').style.display = 'none';
      contentEditor.setData('');
      document.getElementById('btnSubmitForm').innerHTML = '➕ Tambah Modul';
      document.getElementById('btnCancelEdit').style.display = 'none';
    }

    async function editModule(id) {
      const { data: m, error } = await supabase.from('modules').select('*').eq('id', id).single();
      
      if (m) {
        document.getElementById('moduleIdInput').value = m.id;
        document.getElementById('trackSelect').value = m.track_id;
        document.getElementById('titleInput').value = m.title;
        document.getElementById('iconInput').value = m.icon || '📚';
        document.getElementById('moduleImageOld').value = m.image_url;
        document.getElementById('subtitleInput').value = m.subtitle || '';
        document.getElementById('descriptionInput').value = m.description || '';
        contentEditor.setData(m.content || '');

        if (m.image_url) {
          const preview = document.getElementById('moduleImagePreview');
          preview.style.display = 'block';
          preview.querySelector('img').src = m.image_url;
        }

        document.getElementById('btnSubmitForm').innerHTML = '💾 Update Modul';
        document.getElementById('btnCancelEdit').style.display = 'inline-block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } else {
        alert('Gagal mengambil data modul: ' + (error?.message || 'Unknown error'));
      }
    }

    async function saveModule(e) {
      e.preventDefault();
      const alertBox = document.getElementById('alertBox');
      const btn = document.getElementById('btnSubmitForm');
      btn.disabled = true; btn.textContent = 'Memproses...';
      
      try {
        const id = document.getElementById('moduleIdInput').value;
        const fileInput = document.getElementById('moduleImageInput');
        let imageUrl = document.getElementById('moduleImageOld').value;

        // Upload Gambar jika ada
        if (fileInput.files.length > 0) {
          const file = fileInput.files[0];
          const fileName = `modul_${Date.now()}_${file.name.replace(/\s+/g, '-')}`;
          const { data, error } = await supabase.storage.from('article-images').upload(fileName, file);
          if (error) throw error;
          const { data: urlData } = supabase.storage.from('article-images').getPublicUrl(fileName);
          imageUrl = urlData.publicUrl;
        }

        const title = document.getElementById('titleInput').value;
        const payload = {
          track_id: document.getElementById('trackSelect').value,
          title: title,
          subtitle: document.getElementById('subtitleInput').value,
          description: document.getElementById('descriptionInput').value,
          content: contentEditor.getData(), 
          icon: document.getElementById('iconInput').value,
          image_url: imageUrl,
          is_published: true
        };

        let result;
        if (id) {
          // Update: Slug tidak diubah agar link tidak rusak
          result = await supabase.from('modules').update(payload).eq('id', id);
        } else {
          // Insert: Buat slug otomatis (judul + timestamp agar unik)
          payload.slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '') + '-' + Date.now();
          result = await supabase.from('modules').insert([payload]);
        }

        if (result.error) throw result.error;

        alertBox.innerHTML = `<div class="alert alert-success">✅ Modul berhasil ${id ? 'diperbarui' : 'dibuat'}!</div>`;
        cancelEdit(); 
        loadModules();
        setTimeout(() => alertBox.innerHTML = '', 5000);

      } catch (err) {
        console.error(err);
        alertBox.innerHTML = `<div class="alert alert-error">❌ Gagal: ${err.message}</div>`;
      } finally {
        btn.disabled = false; btn.textContent = id ? '💾 Update Modul' : '➕ Tambah Modul';
      }
    }

    async function deleteModule(id, title) {
      if (!confirm('Yakin hapus modul "' + title + '"?')) return;
      
      const { error } = await supabase.from('modules').delete().eq('id', id);
      const alertBox = document.getElementById('alertBox');
      
      if (!error) {
        alertBox.innerHTML = '<div class="alert alert-success">✅ Modul berhasil dihapus!</div>';
        loadModules();
        setTimeout(() => alertBox.innerHTML = '', 5000);
      } else {
        alertBox.innerHTML = '<div class="alert alert-error">❌ Gagal: ' + error.message + '</div>';
      }
    }

    /* =========================================
       LOGIKA ARTIKEL (SUPABASE FULL)
       ========================================= */

    async function loadArticles() {
      const tbody = document.getElementById('articleBody');
      const { data, error } = await supabase.from('articles').select('*').order('created_at', { ascending: false });
      if (error) { tbody.innerHTML = `<tr><td colspan="5" style="color:red;">Error: ${error.message}</td></tr>`; return; }
      if (data.length === 0) { tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#999;">Belum ada artikel.</td></tr>`; return; }
      tbody.innerHTML = data.map(a => `
        <tr>
          <td><img src="${a.image_url || '../assets/logo-koawis-brand.png'}" style="width:60px; height:40px; object-fit:cover; border-radius:4px;"></td>
          <td>${a.title}</td>
          <td><span style="background:#eee; padding:2px 8px; border-radius:4px; font-size:0.8rem;">${a.category}</span></td>
          <td>${new Date(a.created_at).toLocaleDateString('id-ID')}</td>
          <td>
            <button class="btn-action btn-edit" onclick="editArticle('${a.id}')">Edit</button>
            <button class="btn-action btn-delete" onclick="deleteArticle('${a.id}')">Hapus</button>
          </td>
        </tr>
      `).join('');
    }

    async function saveArticle(e) {
      e.preventDefault();
      const btn = document.getElementById('btnSubmitArticle');
      const alertBox = document.getElementById('alertBoxArticle');
      btn.disabled = true; btn.textContent = 'Memproses...';

      try {
        const id = document.getElementById('articleIdInput').value;
        const fileInput = document.getElementById('artImageInput');
        let imageUrl = document.getElementById('articleImageOld').value;

        if (fileInput.files.length > 0) {
          const file = fileInput.files[0];
          const fileName = `thumb_${Date.now()}_${file.name.replace(/\s+/g, '-')}`;
          const { data, error } = await supabase.storage.from('article-images').upload(fileName, file);
          if (error) throw error;
          const { data: urlData } = supabase.storage.from('article-images').getPublicUrl(fileName);
          imageUrl = urlData.publicUrl;
        }

        const title = document.getElementById('artTitleInput').value;
        const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '') + '-' + Date.now();
        
        const payload = {
          title: title,
          slug: slug,
          category: document.getElementById('artCategoryInput').value,
          content: articleEditor.getData(),
          excerpt: articleEditor.getData().replace(/<[^>]*>?/gm, '').substring(0, 150) + '...',
          image_url: imageUrl,
          is_published: true
        };

        let result;
        if (id) {
          delete payload.slug; 
          result = await supabase.from('articles').update(payload).eq('id', id);
        } else {
          result = await supabase.from('articles').insert([payload]);
        }

        if (result.error) throw result.error;
        alertBox.innerHTML = `<div class="alert alert-success">✅ Artikel berhasil disimpan!</div>`;
        cancelEditArticle(); loadArticles();
        setTimeout(() => alertBox.innerHTML = '', 3000);
      } catch (err) {
        console.error(err);
        alertBox.innerHTML = `<div class="alert alert-error">❌ Gagal: ${err.message}</div>`;
      } finally {
        btn.disabled = false; btn.textContent = id ? '💾 Update Artikel' : '➕ Terbitkan Artikel';
      }
    }

    async function editArticle(id) {
      const { data, error } = await supabase.from('articles').select('*').eq('id', id).single();
      if (data) {
        document.getElementById('articleIdInput').value = data.id;
        document.getElementById('artTitleInput').value = data.title;
        document.getElementById('artCategoryInput').value = data.category;
        document.getElementById('articleImageOld').value = data.image_url;
        articleEditor.setData(data.content || '');
        if (data.image_url) {
          const preview = document.getElementById('imagePreview');
          preview.style.display = 'block';
          preview.querySelector('img').src = data.image_url;
        }
        document.getElementById('btnSubmitArticle').textContent = '💾 Update Artikel';
        document.getElementById('btnCancelArt').style.display = 'inline-block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function cancelEditArticle() {
      document.getElementById('articleForm').reset();
      document.getElementById('articleIdInput').value = '';
      document.getElementById('articleImageOld').value = '';
      document.getElementById('imagePreview').style.display = 'none';
      articleEditor.setData('');
      document.getElementById('btnSubmitArticle').textContent = '➕ Terbitkan Artikel';
      document.getElementById('btnCancelArt').style.display = 'none';
    }

    async function deleteArticle(id) {
      if(!confirm('Hapus artikel ini?')) return;
      await supabase.from('articles').delete().eq('id', id);
      loadArticles();
    }

    function MyCustomUploadAdapterPlugin( editor ) {
      editor.plugins.get( 'FileRepository' ).createUploadAdapter = ( loader ) => {
        return {
          upload: () => {
            return loader.file.then( file => new Promise( async ( resolve, reject ) => {
              try {
                const fileName = `content_${Date.now()}_${file.name.replace(/\s+/g, '-')}`;
                const { data, error } = await supabase.storage.from('article-images').upload(fileName, file);
                if (error) {
                    if (error.message.includes('Bucket not found')) throw new Error("Bucket 'article-images' belum dibuat di Supabase.");
                    throw error;
                }
                const { data: urlData } = supabase.storage.from('article-images').getPublicUrl(fileName);
                resolve( { default: urlData.publicUrl } );
              } catch (err) { reject( err.message ); }
            }));
          }
        };
      };
    }
  </script>
</body>
</html>
