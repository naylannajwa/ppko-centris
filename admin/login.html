<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Login — KO AWIS</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/png" href="../assets/logo-koawis-brand.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background: var(--brown-100); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: var(--white); padding: 2.5rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); width: 100%; max-width: 400px; text-align: center; }
    .login-logo { height: 80px; margin-bottom: 1.5rem; margin-left: auto; margin-right: auto; }
    .form-group { margin-bottom: 1rem; text-align: left; }
    .btn-full { width: 100%; justify-content: center; margin-top: 1rem; }
    .error-msg { color: #d32f2f; background: #ffebee; padding: 0.5rem; border-radius: var(--radius-sm); font-size: 0.9rem; margin-bottom: 1rem; display: none; }
  </style>
</head>
<body>

  <div class="login-card">
    <img src="../assets/logo-koawis-brand.png" alt="Logo KO AWIS" class="login-logo">
    <h2 style="margin-bottom: 0.5rem; color: var(--brown-800);">Login Admin</h2>
    <p class="text-muted" style="margin-bottom: 2rem; font-size: 0.9rem;">Masuk untuk mengelola konten</p>

    <div id="errorMsg" class="error-msg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-input" placeholder="Masukkan email admin" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position: relative;">
          <input type="password" id="password" class="form-input" placeholder="••••••••" required style="padding-right: 40px;">
          <i id="togglePassword" class="fa-solid fa-eye" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-light);"></i>
        </div>
      </div>
      <button type="submit" class="btn-daftar btn-full" id="btnSubmit">Masuk</button>
    </form>
    
    <div style="margin-top: 1.5rem;">
      <a href="../index.html" class="text-muted" style="font-size: 0.85rem;">← Kembali ke Beranda</a>
    </div>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  
  <script>
    const loginForm = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const btnSubmit = document.getElementById('btnSubmit');
    // --- FITUR LIHAT PASSWORD ---
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    togglePassword.addEventListener('click', function () {
      // Toggle type
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      // Toggle class icon Font Awesome
      this.classList.toggle('fa-eye');
      this.classList.toggle('fa-eye-slash');
    });

    // Cek jika sudah login
    document.addEventListener('DOMContentLoaded', async () => {
      const { data } = await supabase.auth.getSession();
      if (data.session) {
        window.location.href = 'index.html'; // Redirect ke dashboard
      }
    });

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      btnSubmit.textContent = 'Memproses...';
      btnSubmit.disabled = true;
      errorMsg.style.display = 'none';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        // Cek apakah library Supabase sudah siap
        if (typeof supabase === 'undefined') throw new Error('Gagal memuat Supabase. Cek koneksi internet.');

        const { data, error } = await supabase.auth.signInWithPassword({
          email: email,
          password: password
        });

        if (error) throw error; // Lempar error agar ditangkap catch di bawah

        // Jika sukses
        window.location.href = 'index.html'; 

      } catch (err) {
        console.error(err);
        errorMsg.textContent = 'Login gagal: ' + (err.message || 'Terjadi kesalahan.');
        errorMsg.style.display = 'block';
        btnSubmit.textContent = 'Masuk';
        btnSubmit.disabled = false;
      }
    });
  </script>
</body>
</html>
